<meta name="theme-color" content="#0a0a0f">
<title>Marcador Dominó</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --azul: #3b82f6;
  --azul-glow: rgba(59,130,246,0.35);
  --vermelho: #ef4444;
  --verm-glow: rgba(239,68,68,0.35);
  --ouro: #f59e0b;
  --texto: #e8e8f0;
  --muted: #6b6b80;
  --radius: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--texto);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  -webkit-text-size-adjust: 100%;
}

button {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.5;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

header {
  position: relative; z-index: 10;
  text-align: center;
  padding: 20px 16px 10px;
}

.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 8vw, 42px);
  letter-spacing: 6px;
  background: linear-gradient(135deg, #fff 30%, var(--muted));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.domino-icon {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  margin-bottom: 6px;
}

.tile {
  width: 22px; height: 38px;
  background: var(--surface2);
  border-radius: 4px;
  border: 1.5px solid rgba(255,255,255,0.12);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-around;
  padding: 4px 3px;
  gap: 2px;
}

.pip-row { display: flex; gap: 3px; }
.pip { width: 4px; height: 4px; border-radius: 50%; background: white; }

.meta-wrap {
  position: relative; z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 8px auto 16px;
}

.meta-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

.meta-input {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
  width: 90px;
  text-align: center;
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: var(--ouro);
  padding: 4px 8px;
  outline: none;
  transition: border-color 0.2s;
}

.meta-input:focus { border-color: var(--ouro); }

.progress-wrap {
  position: relative; z-index: 10;
  margin: 0 12px 18px;
  height: 6px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: visible;
  display: flex;
  gap: 2px;
}

.progress-a, .progress-b {
  height: 100%;
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}

.progress-a { background: linear-gradient(90deg, #1d4ed8, var(--azul)); }
.progress-b { background: linear-gradient(90deg, #b91c1c, var(--vermelho)); }

.container {
  position: relative; z-index: 10;
  display: flex;
  gap: 10px;
  padding: 0 12px;
}

.time {
  flex: 1;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 12px 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  border: 1px solid rgba(255,255,255,0.06);
}

.time::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
  transition: opacity 0.3s;
}

.timeA::before { background: linear-gradient(90deg, #1d4ed8, var(--azul), #60a5fa); }
.timeB::before { background: linear-gradient(90deg, #b91c1c, var(--vermelho), #f87171); }

.time::after {
  content: '';
  position: absolute;
  width: 120px; height: 120px;
  border-radius: 50%;
  top: -40px;
  opacity: 0.12;
  filter: blur(40px);
  pointer-events: none;
  transition: opacity 0.4s;
}

.timeA::after { background: var(--azul); left: -20px; }
.timeB::after { background: var(--vermelho); right: -20px; }

.time.lider::after { opacity: 0.3; }
.time.lider {
  transform: translateY(-3px);
  box-shadow: 0 0 24px rgba(34,197,94,0.5), 0 0 48px rgba(34,197,94,0.25);
  border-color: rgba(34,197,94,0.4);
  animation: pulsoVerde 1.6s ease-in-out infinite;
}

@keyframes pulsoVerde {
  0%,100% { box-shadow: 0 0 18px rgba(34,197,94,0.4), 0 0 40px rgba(34,197,94,0.2); }
  50%      { box-shadow: 0 0 36px rgba(34,197,94,0.75), 0 0 70px rgba(34,197,94,0.4); }
}

.time.lider::before {
  background: linear-gradient(90deg, #15803d, #22c55e, #86efac) !important;
}

.flag {
  font-size: 20px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
}

.nome {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(18px, 5vw, 22px);
  letter-spacing: 3px;
  border: none;
  background: transparent;
  color: white;
  text-align: center;
  width: 100%;
  outline: none;
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
  transition: border-color 0.2s;
}

.nome:focus { border-bottom-color: rgba(255,255,255,0.2); }

.pontos-wrap {
  position: relative;
  margin: 10px 0 8px;
}

.pontos {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 20vw, 100px);
  line-height: 1;
  letter-spacing: -2px;
  transition: transform 0.15s ease, color 0.3s;
  display: block;
}

.timeA .pontos { color: #93c5fd; }
.timeB .pontos { color: #fca5a5; }

.pontos.bump {
  animation: bump 0.25s cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

@keyframes bump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.12); }
  70%  { transform: scale(0.95); }
  100% { transform: scale(1); }
}

.time.venceu .pontos {
  background: linear-gradient(135deg, var(--ouro), #fde68a, var(--ouro));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 2s linear infinite;
}

@keyframes shimmer {
  to { background-position: 200% center; }
}

/* ── HISTÓRICO ── */
.historico-wrap {
  margin: 0 0 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 7px 8px 6px;
  min-height: 34px;
  position: relative;
  z-index: 1;
}

.historico-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
  text-align: left;
}

.historico-lista {
  display: flex;
  gap: 5px;
  justify-content: flex-start;
  flex-wrap: nowrap;
  overflow: hidden;
  min-height: 22px;
}

.hist-item {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 99px;
  white-space: nowrap;
  opacity: 1;
  animation: fadeSlide 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
}

@keyframes fadeSlide {
  from { transform: translateY(-8px) scale(0.8); opacity: 0; }
  to   { transform: translateY(0) scale(1);     opacity: 1; }
}

/* Mais recente = mais opaco, mais antigos = mais transparentes */
.hist-item:nth-child(1) { opacity: 1; }
.hist-item:nth-child(2) { opacity: 0.75; }
.hist-item:nth-child(3) { opacity: 0.55; }
.hist-item:nth-child(4) { opacity: 0.38; }
.hist-item:nth-child(5) { opacity: 0.22; }

.timeA .hist-item.pos { background: rgba(59,130,246,0.25); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
.timeA .hist-item.neg { background: rgba(239,68,68,0.18);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
.timeB .hist-item.pos { background: rgba(239,68,68,0.22);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.timeB .hist-item.neg { background: rgba(59,130,246,0.18); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }

.botoes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}

.btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1px;
  padding: 12px 6px;
  border-radius: 12px;
  border: none;
  color: white;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.12s, box-shadow 0.2s;
}

.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.15s;
  border-radius: inherit;
}

.btn:active { transform: scale(0.90); }
.btn:active::after { background: rgba(255,255,255,0.15); }

.btn5   { background: linear-gradient(135deg, #15803d, #22c55e); }
.btn10  { background: linear-gradient(135deg, #0e7490, #06b6d4); }
.btn20  { background: linear-gradient(135deg, #7e22ce, #a855f7); }
.btn25  { background: linear-gradient(135deg, #b45309, #f59e0b); }
.btnNeg { background: linear-gradient(135deg, #c2410c, #f97316); padding: 10px; font-size: 18px; }

.vitorias-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 0 0 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 8px 10px;
}

.vitorias-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  flex: 1;
  text-align: left;
}

.vitorias-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  line-height: 1;
  color: var(--ouro);
  min-width: 28px;
  text-align: center;
}

.btn-v {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  width: 38px; height: 30px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  color: white;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.12s;
}

.btn-v:active { transform: scale(0.88); }
.btn-v-plus  { background: #16a34a; }
.btn-v-minus { background: #6b7280; }

.bottom {
  position: relative; z-index: 10;
  text-align: center;
  margin: 18px 0 24px;
}

.btn-reset {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 9px 22px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-reset:hover {
  color: white;
  border-color: rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.05);
}

.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ouro);
  color: #000;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  padding: 12px 28px;
  border-radius: 99px;
  z-index: 100;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>

</head>

<script>
let pontos   = { A: 0, B: 0 };
let vitorias = { A: 0, B: 0 };
let historico = { A: [], B: [] };   // array dos últimos lances (mais recente no índice 0)

let pendingSpeech  = { A: 0, B: 0 };
let speechTimeout  = { A: null, B: null };

/* ─── HISTÓRICO ─── */
function pushHistorico(time) {
  historico[time].unshift(pontos[time]);    // total acumulado após o lance
  if (historico[time].length > 5) historico[time].pop();
  renderHistorico(time);
}

function renderHistorico(time) {
  const container = document.getElementById('hist' + time);
  container.innerHTML = '';
  historico[time].forEach((v) => {
    const span = document.createElement('span');
    span.className = 'hist-item ' + (v >= 0 ? 'pos' : 'neg');
    span.textContent = (v > 0 ? '+' : '') + v;
    container.appendChild(span);
  });
}

function limparHistorico() {
  historico = { A: [], B: [] };
  renderHistorico('A');
  renderHistorico('B');
}

/* ─── VITÓRIAS ─── */
function addVit(time, val) {
  vitorias[time] = Math.max(0, vitorias[time] + val);
  document.getElementById('v' + time).textContent = vitorias[time];
}

function resetarVitorias() {
  document.getElementById('modalVitorias').style.display = 'flex';
}
function confirmarResetVitorias() {
  tocarSomReset();
  document.getElementById('modalVitorias').style.display = 'none';
  vitorias = { A: 0, B: 0 };
  document.getElementById('vA').textContent = 0;
  document.getElementById('vB').textContent = 0;
}
function cancelarResetVitorias() {
  document.getElementById('modalVitorias').style.display = 'none';
}

/* ─── SPEECH ─── */
function falar(valor, time) {
  try {
    if (!window.speechSynthesis) return;
    pendingSpeech[time] += valor;
    if (speechTimeout[time]) clearTimeout(speechTimeout[time]);
    speechTimeout[time] = setTimeout(() => {
      const total = pendingSpeech[time];
      pendingSpeech[time] = 0;
      if (total === 0) return;
      const nome = document.getElementById('nome' + time).value || 'Equipe ' + time;
      const texto = total > 0
        ? nome + ', mais ' + total
        : nome + ', menos ' + Math.abs(total);
      window.speechSynthesis.cancel();
      const fala = new SpeechSynthesisUtterance(texto);
      fala.lang = 'pt-BR'; fala.rate = 1.1;
      window.speechSynthesis.speak(fala);
    }, 600);
  } catch(e) {}
}

/* ─── TOAST ─── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ─── BUMP ─── */
function bumpEl(id) {
  const el = document.getElementById(id);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}

/* ─── ATUALIZAR ─── */
function atualizar() {
  const meta = parseInt(document.getElementById('meta').value) || 200;
  document.getElementById('pA').textContent = pontos.A;
  document.getElementById('pB').textContent = pontos.B;

  const timeA = document.getElementById('timeA');
  const timeB = document.getElementById('timeB');

  timeA.classList.remove('lider', 'venceu');
  timeB.classList.remove('lider', 'venceu');

  if (pontos.A > pontos.B)      timeA.classList.add('lider');
  else if (pontos.B > pontos.A) timeB.classList.add('lider');

  const progA = document.getElementById('progA');
  const progB = document.getElementById('progB');
  const total = pontos.A + pontos.B;
  if (total > 0) {
    progA.style.width = (pontos.A / (meta * 2) * 100).toFixed(1) + '%';
    progB.style.width = (pontos.B / (meta * 2) * 100).toFixed(1) + '%';
  } else {
    progA.style.width = '0%';
    progB.style.width = '0%';
  }

  const nomeA = document.getElementById('nomeA').value || 'Equipe A';
  const nomeB = document.getElementById('nomeB').value || 'Equipe B';

  if (pontos.A >= meta) { timeA.classList.add('venceu'); showToast('🏆 ' + nomeA + ' venceu!'); }
  if (pontos.B >= meta) { timeB.classList.add('venceu'); showToast('🏆 ' + nomeB + ' venceu!'); }
}

/* ─── SOM RESET ─── */
function tocarSomReset() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const tempos = [0, 0.12, 0.24];
    tempos.forEach((t, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880 - i * 220, ctx.currentTime + t);
      gain.gain.setValueAtTime(0.35, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.18);
    });
  } catch(e) {}
}

/* ─── RESET ─── */
function resetar() {
  document.getElementById('modal').style.display = 'flex';
}

function confirmarReset() {
  tocarSomReset();
  document.getElementById('modal').style.display = 'none';
  const meta = parseInt(document.getElementById('meta').value) || 200;
  if (pontos.A >= meta || pontos.B >= meta) {
    if (pontos.A > pontos.B)      addVit('A', 1);
    else if (pontos.B > pontos.A) addVit('B', 1);
  }
  pontos = { A: 0, B: 0 };
  limparHistorico();
  document.getElementById('timeA').classList.remove('venceu', 'lider');
  document.getElementById('timeB').classList.remove('venceu', 'lider');
  atualizar();
}

function cancelarReset() {
  document.getElementById('modal').style.display = 'none';
}

/* ─── ADD ─── */
let pendingHist = { A: 0, B: 0 };
let histTimeout = { A: null, B: null };

function add(time, valor) {
  pontos[time] = Math.max(0, pontos[time] + valor);
  pendingHist[time] += valor;

  if (histTimeout[time]) clearTimeout(histTimeout[time]);
  histTimeout[time] = setTimeout(() => {
    const total = pendingHist[time];
    pendingHist[time] = 0;
    historico[time].unshift(total);
    if (historico[time].length > 5) historico[time].pop();
    renderHistorico(time);
  }, 600);

  bumpEl('p' + time);
  falar(valor, time);
  atualizar();
}

atualizar();

// Service Worker para funcionar offline
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'domino-v1';
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(cache => cache.addAll(['/']))
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request).then(resp => {
          return caches.open(CACHE).then(cache => {
            cache.put(e.request, resp.clone());
            return resp;
          });
        }))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
